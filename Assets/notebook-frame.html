<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wolfram Notebook Frame</title>
<style>
    html, body { margin: 0; padding: 0; }
    #nb { display: block; width: 100%; border: 0; }
</style>
</head>
<body>
<script>
(function () {
    "use strict";

    // This page is deployed to the Wolfram Cloud and framed by an AgentTools MCP-app viewer
    // (evaluator-viewer / wolframalpha-viewer) on hosts whose sandbox CSP blocks eval, so the
    // in-document WolframNotebookEmbedder can't run. See docs/mcp-apps.md.
    //
    // Its job: give the cross-origin viewer a height it cannot measure itself. This page and
    // the notebook it frames share the www.wolframcloud.com origin, so this page CAN read the
    // notebook's rendered height and relay it to the viewer via postMessage -- yielding
    // pixel-perfect, live auto-resizing instead of a fixed-height frame.

    var HEIGHT_MESSAGE = "wolfram-notebook-height";

    // The viewer passes the notebook URL in the fragment: notebook-frame.html#nb=<encoded url>.
    // (Fragment, not query, so the URL never reaches a server or a log.)
    function parseNotebookUrl() {
        var raw = (location.hash || "").replace(/^#/, "") || (location.search || "").replace(/^\?/, "");
        var m = /(?:^|&)nb=([^&]*)/.exec(raw);
        if (!m) return null;
        var url;
        try { url = decodeURIComponent(m[1]); } catch (e) { return null; }
        // Only ever frame Wolfram Cloud notebooks.
        if (!/^https:\/\/([a-z0-9-]+\.)*wolframcloud\.com\//i.test(url) &&
            !/^https:\/\/([a-z0-9-]+\.)*wolfr\.am\//i.test(url)) return null;
        return url;
    }

    var notebookUrl = parseNotebookUrl();
    if (!notebookUrl) return;

    var iframe = document.createElement("iframe");
    iframe.id = "nb";
    iframe.setAttribute("title", "Wolfram notebook");
    iframe.src = notebookUrl;
    document.body.appendChild(iframe);

    var lastPosted = -1;
    function postHeight(h) {
        if (!(h > 0) || h === lastPosted) return;
        lastPosted = h;
        if (window.parent && window.parent !== window) {
            window.parent.postMessage({ type: HEIGHT_MESSAGE, height: h }, "*");
        }
    }

    // The notebook page sets `html, body { height: 100% }`, so at the frame's current height
    // its body would simply fill the frame and body.scrollHeight would echo the frame height
    // (circular). Collapse the frame to 0 first: the notebook content then overflows the
    // zero-height body and documentElement.scrollHeight reports the true content height. The
    // collapse + restore happen synchronously within one call, so the 0-height state is never
    // painted (no flicker); the read in between forces the layout we need.
    var measuring = false;
    function measure() {
        if (measuring) return;
        var doc;
        try { doc = iframe.contentDocument; } catch (e) { return; } // cross-origin (shouldn't happen)
        if (!doc || !doc.documentElement) return;
        measuring = true;
        var restore = iframe.style.height;
        iframe.style.height = "0px";
        var h = 0;
        try {
            h = Math.max(
                doc.documentElement.scrollHeight || 0,
                doc.body ? (doc.body.scrollHeight || 0) : 0
            );
        } catch (e) { h = 0; }
        iframe.style.height = (h > 0 ? h : (parseInt(restore, 10) || 0)) + "px";
        measuring = false;
        postHeight(h);
    }

    // Coalesce bursts (the engine mutates the DOM heavily while rendering).
    var scheduled = false;
    function scheduleMeasure() {
        if (scheduled) return;
        scheduled = true;
        setTimeout(function () { scheduled = false; measure(); }, 100);
    }

    iframe.addEventListener("load", function () {
        measure();
        // 1) Poll while the notebook renders asynchronously after the page load event.
        var ticks = 0;
        var poll = setInterval(function () {
            measure();
            if (++ticks >= 24) clearInterval(poll); // ~12s
        }, 500);
        // 2) Track later content changes (dynamic output, Manipulate, opened cell groups).
        //    A MutationObserver fires on DOM changes, not on our own frame resize, so it can't
        //    feed back into a resize loop the way a ResizeObserver on the body would.
        try {
            var doc = iframe.contentDocument;
            if (doc && doc.body && typeof MutationObserver !== "undefined") {
                new MutationObserver(scheduleMeasure).observe(doc.body, {
                    childList: true, subtree: true, attributes: true, characterData: true
                });
            }
        } catch (e) {}
    });

    // The viewer's width can change (host panel resize), which reflows the notebook.
    window.addEventListener("resize", scheduleMeasure);
})();
</script>
</body>
</html>
