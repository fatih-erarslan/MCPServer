<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notebook Viewer</title>
    <style>
        :root {
            --app-bg: #ffffff;
            --app-fg: #1a1a2e;
            --border-color: #dee2e6;
            --spinner-color: #0066cc;
            --error-bg: #fff5f5;
            --error-fg: #c53030;
            --error-border: #feb2b2;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --app-bg: #1a1a2e;
                --app-fg: #e0e0e0;
                --border-color: #3a3a5c;
                --spinner-color: #5599ff;
                --error-bg: #2d1b1b;
                --error-fg: #fc8181;
                --error-border: #742a2a;
            }
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font-sans, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif);
            font-size: 14px;
            background: var(--app-bg);
            color: var(--app-fg);
            line-height: 1.5;
        }
        #container {
            width: 100%;
            min-height: 100px;
        }
        #loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 32px 16px;
            color: var(--app-fg);
            opacity: 0.7;
        }
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border-color);
            border-top-color: var(--spinner-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #error {
            display: none;
            padding: 12px 16px;
            margin: 8px;
            background: var(--error-bg);
            color: var(--error-fg);
            border: 1px solid var(--error-border);
            border-radius: 6px;
            font-size: 0.9em;
        }
        .notebook-frame {
            position: relative;
            box-sizing: border-box;
            width: 100%;
            min-height: 100px;
            padding-bottom: 11px;
        }
        .notebook-frame iframe {
            display: block;
            width: 100%;
            height: 100%;
            border: none;
        }
        /* Full-width drag handle for the cross-origin iframe fallback. It sits in the
           frame's bottom padding strip, clear of the framed notebook's own scrollbar,
           which otherwise covers a native corner `resize` grip and eats the clicks. */
        .notebook-resize-handle {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: ns-resize;
            background: rgba(127, 127, 127, 0.14);
            touch-action: none;
        }
        .notebook-resize-handle:hover {
            background: rgba(127, 127, 127, 0.24);
        }
        .notebook-resize-handle::before {
            content: "";
            width: 32px;
            height: 3px;
            border-radius: 3px;
            background: rgba(127, 127, 127, 0.75);
        }
    </style>
</head>
<body>
    <div id="app-root">
        <div id="loading">
            <div class="spinner"></div>
            <span>Loading notebook...</span>
        </div>
        <div id="error"></div>
        <div id="container"></div>
    </div>

    <script>
    (function() {
        "use strict";

        // ---- Debug logging ----
        // Prefixed so it can be filtered in the console (search "notebook-viewer").
        // Added to diagnose WolframNotebookEmbedder failures under newer hosts.
        var LOG_PREFIX = "[notebook-viewer]";
        function log() {
            var a = Array.prototype.slice.call(arguments);
            a.unshift(LOG_PREFIX);
            console.log.apply(console, a);
        }
        function logError() {
            var a = Array.prototype.slice.call(arguments);
            a.unshift(LOG_PREFIX);
            console.error.apply(console, a);
        }

        // Surface failures the host console might otherwise hide: uncaught
        // exceptions, rejected promises, and CSP blocks (a likely cause of the
        // CDN script or wolframcloud.com iframe failing to load in newer hosts).
        window.addEventListener("error", function(e) {
            logError("window error:", e.message, "@",
                (e.filename || "?") + ":" + e.lineno + ":" + e.colno, e.error || "");
        });
        window.addEventListener("unhandledrejection", function(e) {
            logError("unhandled promise rejection:", e.reason);
        });
        document.addEventListener("securitypolicyviolation", function(e) {
            logError("CSP violation:", e.violatedDirective, "blocked", e.blockedURI,
                "| policy:", e.originalPolicy);
        });

        // ---- State ----
        var nextId = 1;
        var pending = {};
        var embedded = null;
        // Whether an embed has been initiated (from tool-input, normally). Guards the
        // tool-result fallback below against embedding the same notebook twice.
        var embedRequested = false;

        // ---- Detect whether this host's sandbox CSP permits eval ----
        // WolframNotebookEmbedder injects the cloud notebook engine as <script>s into THIS
        // document; that engine uses eval()/new Function()/WebAssembly, all of which the
        // browser gates on script-src 'unsafe-eval'. Strict MCP hosts (e.g. Goose) build the
        // app sandbox CSP without 'unsafe-eval' and reject any attempt to add it, so the
        // engine throws EvalError and the notebook never renders. When eval is blocked we
        // render the notebook in a cross-origin iframe instead (see embedNotebookViaIframe),
        // where it runs under wolframcloud.com's own eval-permitting CSP. The Function
        // constructor throws synchronously under such a CSP, so this probe is reliable; it
        // emits one expected CSP violation on strict hosts.
        var cspAllowsEval = (function() {
            try { new Function(""); return true; }
            catch (e) { return false; }
        })();
        log("cspAllowsEval =", cspAllowsEval);

        // Default initial height (px) for the cross-origin iframe fallback, which cannot
        // be auto-sized. Overridden by a finite positive maxHeight tool argument when
        // given; either way the frame starts at this height and the user can drag to resize.
        var NOTEBOOK_IFRAME_HEIGHT = 200;

        // ---- Load WolframNotebookEmbedder dynamically ----
        var embedderLoaded = new Promise(function(resolve, reject) {
            var script = document.createElement("script");
            script.src = "https://unpkg.com/wolfram-notebook-embedder@0.3/dist/wolfram-notebook-embedder.min.js";
            script.crossOrigin = "";
            log("loading WolframNotebookEmbedder from", script.src);
            script.onload = function() {
                log("WolframNotebookEmbedder script loaded; global available:",
                    typeof WolframNotebookEmbedder !== "undefined");
                resolve();
            };
            script.onerror = function(e) {
                logError("failed to load WolframNotebookEmbedder from CDN:", script.src, e);
                reject(new Error("Failed to load WolframNotebookEmbedder library from CDN."));
            };
            document.head.appendChild(script);
        });

        // ---- DOM refs ----
        var loadingEl = document.getElementById("loading");
        var errorEl = document.getElementById("error");
        var containerEl = document.getElementById("container");

        // ---- Helpers ----
        function showError(msg) {
            loadingEl.style.display = "none";
            errorEl.style.display = "block";
            errorEl.textContent = msg;
        }

        // ---- postMessage transport ----
        function send(msg) {
            window.parent.postMessage(msg, "*");
        }

        function sendRequest(method, params) {
            var id = nextId++;
            var msg = { jsonrpc: "2.0", id: id, method: method, params: params || {} };
            send(msg);
            return new Promise(function(resolve, reject) {
                pending[id] = { resolve: resolve, reject: reject };
            });
        }

        function sendNotification(method, params) {
            var msg = { jsonrpc: "2.0", method: method };
            if (params) msg.params = params;
            send(msg);
        }

        function sendResult(id, result) {
            send({ jsonrpc: "2.0", id: id, result: result });
        }

        function sendError(id, code, message) {
            send({ jsonrpc: "2.0", id: id, error: { code: code, message: message } });
        }

        // ---- Auto-resize ----
        function setupAutoResize() {
            if (typeof ResizeObserver === "undefined") return;
            var appRoot = document.getElementById("app-root");
            var observer = new ResizeObserver(function() {
                var width = appRoot.scrollWidth;
                var height = appRoot.scrollHeight;
                sendNotification("ui/notifications/size-changed", {
                    width: width,
                    height: height
                });
            });
            observer.observe(appRoot);
        }

        // ---- Theme application ----
        function applyTheme(ctx) {
            if (!ctx) return;
            if (ctx.styles && ctx.styles.css) {
                var vars = ctx.styles.css.variables;
                if (vars) {
                    var keys = Object.keys(vars);
                    for (var i = 0; i < keys.length; i++) {
                        document.documentElement.style.setProperty(keys[i], vars[keys[i]]);
                    }
                }
                if (ctx.styles.css.fonts && ctx.styles.css.fonts.length) {
                    for (var j = 0; j < ctx.styles.css.fonts.length; j++) {
                        var style = document.createElement("style");
                        style.textContent = ctx.styles.css.fonts[j];
                        document.head.appendChild(style);
                    }
                }
            }
            if (ctx.styles && ctx.styles.variables) {
                var topVars = ctx.styles.variables;
                var topKeys = Object.keys(topVars);
                for (var k = 0; k < topKeys.length; k++) {
                    document.documentElement.style.setProperty(topKeys[k], topVars[topKeys[k]]);
                }
            }
        }

        // ---- Summarize a notebook target for logging ----
        // Inline delivery (MCP_APPS_NOTEBOOK_METHOD="Inline") passes the entire
        // serialized notebook as `url`; logging it verbatim floods the console and
        // can leak notebook content into host-collected logs, so report only size.
        function describeUrl(url) {
            if (typeof url !== "string") return "(non-string: " + (url === null ? "null" : typeof url) + ")";
            return url.startsWith("http") ? url : "(inline notebook, " + url.length + " chars)";
        }

        // ---- Wrap an iframe so the user can drag its bottom edge to resize it ----
        // The cross-origin notebook can't be auto-sized, so the fallback frame opens at a
        // default height and the user grows it from there. A native CSS `resize` grip lands
        // in the bottom-right corner, where the framed notebook's own scrollbar sits on top
        // and eats the clicks, so we add our own full-width drag handle along the bottom
        // (in the frame's padding strip, below the iframe) instead.
        function makeResizableFrame(iframe, initialHeight) {
            var frame = document.createElement("div");
            frame.className = "notebook-frame";
            frame.style.height = Math.max(100, initialHeight) + "px";
            frame.appendChild(iframe);

            var handle = document.createElement("div");
            handle.className = "notebook-resize-handle";
            handle.title = "Drag to resize";
            frame.appendChild(handle);

            handle.addEventListener("pointerdown", function(e) {
                e.preventDefault();
                var startY = e.clientY;
                var startHeight = frame.getBoundingClientRect().height;
                // Disabling the iframe's pointer events keeps the cross-origin frame from
                // swallowing the drag stream; pointer capture is a further optimization that
                // keeps the move/up events flowing while the cursor is over the iframe.
                iframe.style.pointerEvents = "none";
                try { handle.setPointerCapture(e.pointerId); } catch (err) {}

                function onMove(ev) {
                    frame.style.height = Math.max(100, startHeight + ev.clientY - startY) + "px";
                }
                function onEnd() {
                    iframe.style.pointerEvents = "";
                    window.removeEventListener("pointermove", onMove);
                    window.removeEventListener("pointerup", onEnd);
                    window.removeEventListener("pointercancel", onEnd);
                }
                // Bind move/end on window, not the handle, so a drag that strays off the
                // handle (e.g. when setPointerCapture is unsupported) still delivers its
                // events and cleans up, instead of leaving the frame stuck non-interactive.
                window.addEventListener("pointermove", onMove);
                window.addEventListener("pointerup", onEnd);
                window.addEventListener("pointercancel", onEnd);
            });

            return frame;
        }

        // ---- Embed a notebook via a cross-origin iframe ----
        // Used when the host CSP blocks eval (see cspAllowsEval). Pointing an iframe
        // straight at the cloud URL renders the notebook under wolframcloud.com's own
        // (eval-permitting) CSP, isolated from this app's CSP. A cross-origin iframe
        // can't be measured, so it opens at a fixed height (the maxHeight tool argument
        // when finite and positive, else NOTEBOOK_IFRAME_HEIGHT) that the user can drag
        // to resize, with internal scrolling, rather than the embedder's fit-to-content
        // sizing. http(s) URLs only.
        function embedNotebookViaIframe(url, maxHeight) {
            // No generation counter here; clear any prior notebook so iframes don't stack.
            if (embedded) { embedded.detach(); embedded = null; }
            containerEl.innerHTML = "";

            var height = (typeof maxHeight === "number" && isFinite(maxHeight) && maxHeight > 0)
                ? maxHeight
                : NOTEBOOK_IFRAME_HEIGHT;

            var iframe = document.createElement("iframe");
            iframe.src = url;
            iframe.title = "Wolfram notebook";

            var settled = false;
            var watchdog = setTimeout(function() {
                // Skip the warning if the iframe is no longer in the document: a newer
                // notebook or teardown removed it on purpose, so it wasn't stuck loading.
                if (!settled && iframe.isConnected) {
                    logError("embedNotebookViaIframe: iframe still loading after 20s for", url,
                        "- possible blocked wolframcloud.com iframe or network stall");
                }
            }, 20000);

            iframe.addEventListener("load", function() {
                settled = true;
                clearTimeout(watchdog);
                log("embedNotebookViaIframe: iframe loaded for", url);
                loadingEl.style.display = "none";
            });
            containerEl.appendChild(makeResizableFrame(iframe, height));
        }

        // ---- Embed notebook ----
        function embedNotebook(url, allowInteract, maxHeight) {
            loadingEl.style.display = "flex";
            errorEl.style.display = "none";

            var isHttpUrl = typeof url === "string" && url.startsWith("http");
            var target = isHttpUrl ? url : { expr: url };
            log("embedNotebook: target =", describeUrl(url),
                "| allowInteract =", allowInteract, "| maxHeight =", maxHeight);

            // Strict host CSP (no 'unsafe-eval'): the in-document embedder can't run the
            // notebook engine. Render the cloud notebook in a cross-origin iframe instead.
            if (!cspAllowsEval && isHttpUrl) {
                log("embedNotebook: host CSP blocks eval; rendering via cross-origin iframe");
                embedNotebookViaIframe(url, maxHeight);
                return;
            }

            // Watchdog: if embed() neither resolves nor rejects, nothing hits the
            // console. Warn so a blocked iframe / network stall is visible.
            var settled = false;
            var watchdog = setTimeout(function() {
                if (!settled) {
                    logError("embedNotebook: embed() still pending after 20s for", describeUrl(url),
                        "- possible blocked wolframcloud.com iframe or network stall");
                }
            }, 20000);

            embedderLoaded.then(function() {
                if (typeof WolframNotebookEmbedder === "undefined" || !WolframNotebookEmbedder.embed) {
                    throw new Error("WolframNotebookEmbedder.embed is unavailable after load");
                }
                var opts = {
                    allowInteract: allowInteract !== false,
                    showRenderProgress: true,
                    width: null,
                    maxHeight: typeof maxHeight === "number" && maxHeight > 0 ? maxHeight : Infinity
                };

                log("embedNotebook: calling WolframNotebookEmbedder.embed()");
                return WolframNotebookEmbedder.embed(target, containerEl, opts);
            }).then(function(nb) {
                settled = true;
                clearTimeout(watchdog);
                log("embedNotebook: embed succeeded");
                embedded = nb;
                loadingEl.style.display = "none";
            }).catch(function(err) {
                settled = true;
                clearTimeout(watchdog);
                logError("embedNotebook: embed failed for", describeUrl(url), "->", err);
                var msg = (err && err.message) ? err.message : String(err);
                showError(msg);
            });
        }

        // ---- Find notebookUrl in structuredContent, _meta, content items, or content marker ----
        function findNotebookUrl(content, meta, structured) {
            if (structured && structured.notebookUrl) return structured.notebookUrl;
            if (meta && meta.notebookUrl) return meta.notebookUrl;
            if (!content || !Array.isArray(content)) return null;
            for (var i = 0; i < content.length; i++) {
                var item = content[i];
                if (item && item._meta && item._meta.notebookUrl) {
                    return item._meta.notebookUrl;
                }
            }
            return extractNotebookUrlMarker(content);
        }

        // ---- Recover the URL from the <internal>...<url>...</url></internal> content marker ----
        // Fallback for hosts that drop _meta/structuredContent (ext-apps#696). The marker's
        // wrapper text tells the model the notebook is already shown and the URL is not for it
        // to use. (This viewer renders no text, so there is nothing to strip from the display.)
        function extractNotebookUrlMarker(content) {
            if (!content || !Array.isArray(content)) return null;
            // Prefer the LAST marker in document order. The server appends its marker as the
            // final content item (see appendNotebookURLMarker), so the last marker is the
            // trusted one; scanning for the last match rather than the first keeps a marker
            // injected earlier via user-controlled tool output text from overriding the
            // server-appended URL (even if a host concatenates the text items).
            var re = /<internal>[\s\S]*?<url>([\s\S]*?)<\/url>[\s\S]*?<\/internal>/g;
            var url = null;
            for (var i = 0; i < content.length; i++) {
                var item = content[i];
                if (item && item.type === "text" && typeof item.text === "string") {
                    var m;
                    while ((m = re.exec(item.text)) !== null) {
                        if (m[1].trim()) url = m[1].trim();
                    }
                }
            }
            return url;
        }

        // ---- Recover and embed a notebook from a tool result ----
        // This viewer normally embeds from tool-input (arguments.url). As a fallback for hosts
        // that deliver a result but not the input, recover a URL from the result: from
        // _meta/structuredContent, or from the content marker for hosts that drop those.
        function recoverNotebookFromResult(params) {
            if (!params) return;
            var url = findNotebookUrl(params.content, params._meta, params.structuredContent);
            if (url) {
                embedRequested = true;
                embedNotebook(url);
            }
        }

        // ---- Incoming message handler ----
        window.addEventListener("message", function(event) {
            if (event.source !== window.parent) return;

            var msg = event.data;
            if (!msg || typeof msg !== "object" || msg.jsonrpc !== "2.0") return;

            // Handle responses to our requests
            if (msg.id != null && pending[msg.id]) {
                var p = pending[msg.id];
                delete pending[msg.id];
                if (msg.error) {
                    p.reject(msg.error);
                } else {
                    p.resolve(msg.result);
                }
                return;
            }

            // Handle notifications and requests from host
            var method = msg.method;
            if (!method) return;

            switch (method) {
                case "ui/notifications/tool-input":
                    var args = (msg.params && msg.params.arguments) || {};
                    var url = args.url;
                    if (url) {
                        embedRequested = true;
                        embedNotebook(
                            url,
                            args.allowInteract,
                            args.maxHeight
                        );
                    } else {
                        logError("tool-input received without a url; args =", args);
                    }
                    break;

                case "ui/notifications/tool-input-partial":
                    // No action needed for partial input
                    break;

                case "ui/notifications/tool-result":
                    // Normally the notebook is already embedding from tool-input; recover from
                    // the result only if no embed has been initiated yet.
                    if (!embedRequested) recoverNotebookFromResult(msg.params);
                    break;

                case "ui/notifications/tool-cancelled":
                    loadingEl.style.display = "none";
                    embedRequested = false;
                    if (embedded) {
                        embedded.detach();
                        embedded = null;
                    }
                    // Also removes an iframe-rendered notebook (eval-blocked path).
                    containerEl.innerHTML = "";
                    break;

                case "ui/notifications/host-context-changed":
                    applyTheme(msg.params);
                    break;

                case "ui/resource-teardown":
                    embedRequested = false;
                    if (embedded) {
                        embedded.detach();
                        embedded = null;
                    }
                    // Also removes an iframe-rendered notebook (eval-blocked path).
                    containerEl.innerHTML = "";
                    if (msg.id != null) sendResult(msg.id, {});
                    break;

                default:
                    if (msg.id != null) {
                        sendError(msg.id, -32601, "Method not found: " + method);
                    }
                    break;
            }
        });

        // ---- Initialize ----
        sendRequest("ui/initialize", {
            protocolVersion: "2026-01-26",
            appInfo: {
                name: "notebook-viewer",
                version: "1.0.0"
            },
            appCapabilities: {
                availableDisplayModes: ["inline"],
                tools: { listChanged: false }
            }
        }).then(function(result) {
            log("ui/initialize succeeded; host result:", result);
            sendNotification("ui/notifications/initialized");
            setupAutoResize();
            if (result) {
                applyTheme(result.hostContext || result.context || result);
            }
        }).catch(function(err) {
            logError("ui/initialize failed:", err);
            showError("Failed to initialize: " + ((err && err.message) || String(err)));
        });
    })();
    </script>
</body>
</html>
