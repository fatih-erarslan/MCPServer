<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wolfram Language Evaluator Viewer</title>
    <style>
        :root {
            --app-bg: #ffffff;
            --app-fg: #1a1a2e;
            --border-color: #dee2e6;
            --spinner-color: #0066cc;
            --error-bg: #fff5f5;
            --error-fg: #c53030;
            --error-border: #feb2b2;
            --img-border: #e9ecef;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --app-bg: #1f1f1f;
                --app-fg: #e0e0e0;
                --border-color: #3a3a5c;
                --spinner-color: #5599ff;
                --error-bg: #2d1b1b;
                --error-fg: #fc8181;
                --error-border: #742a2a;
                --img-border: #3a3a5c;
            }
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font-sans, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif);
            font-size: 14px;
            background: var(--app-bg);
            color: var(--app-fg);
            line-height: 1.5;
        }
        #error {
            display: none;
            padding: 12px 16px;
            margin: 8px 12px;
            background: var(--error-bg);
            color: var(--error-fg);
            border: 1px solid var(--error-border);
            border-radius: 6px;
            font-size: 0.9em;
        }
        #loading {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 32px 16px;
            color: var(--app-fg);
            opacity: 0.7;
        }
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border-color);
            border-top-color: var(--spinner-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #notebook-container {
            width: 100%;
            min-height: 100px;
        }
        #notebook-container:empty { display: none; }
        #results {
            padding: 12px 16px;
        }
        #results:empty { display: none; }
        .result-text {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 0.95em;
            line-height: 1.6;
        }
        .result-image {
            margin: 8px 0;
            text-align: center;
        }
        .result-image img {
            max-width: 100%;
            height: auto;
            border: 1px solid var(--img-border);
            border-radius: 4px;
        }
        .notebook-frame {
            position: relative;
            box-sizing: border-box;
            width: 100%;
            min-height: 100px;
            padding-bottom: 11px;
        }
        .notebook-frame iframe {
            display: block;
            width: 100%;
            height: 100%;
            border: none;
        }
        /* Full-width drag handle for the cross-origin iframe fallback. It sits in the
           frame's bottom padding strip, clear of the framed notebook's own scrollbar,
           which otherwise covers a native corner `resize` grip and eats the clicks. */
        .notebook-resize-handle {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: ns-resize;
            background: rgba(127, 127, 127, 0.14);
            touch-action: none;
        }
        .notebook-resize-handle:hover {
            background: rgba(127, 127, 127, 0.24);
        }
        .notebook-resize-handle::before {
            content: "";
            width: 32px;
            height: 3px;
            border-radius: 3px;
            background: rgba(127, 127, 127, 0.75);
        }
    </style>
</head>
<body>
    <div id="app-root">
        <div id="error"></div>
        <div id="loading">
            <div class="spinner"></div>
            <span>Evaluating...</span>
        </div>
        <div id="notebook-container"></div>
        <div id="results"></div>
    </div>

    <script>
    (function() {
        "use strict";

        // ---- Debug logging ----
        // Prefixed so it can be filtered in the console (search "evaluator-viewer").
        // Added to diagnose WolframNotebookEmbedder failures under newer hosts.
        var LOG_PREFIX = "[evaluator-viewer]";
        function log() {
            var a = Array.prototype.slice.call(arguments);
            a.unshift(LOG_PREFIX);
            console.log.apply(console, a);
        }
        function logError() {
            var a = Array.prototype.slice.call(arguments);
            a.unshift(LOG_PREFIX);
            console.error.apply(console, a);
        }

        // Surface failures the host console might otherwise hide: uncaught
        // exceptions, rejected promises, and CSP blocks (a likely cause of the
        // CDN script or wolframcloud.com iframe failing to load in newer hosts).
        window.addEventListener("error", function(e) {
            logError("window error:", e.message, "@",
                (e.filename || "?") + ":" + e.lineno + ":" + e.colno, e.error || "");
        });
        window.addEventListener("unhandledrejection", function(e) {
            logError("unhandled promise rejection:", e.reason);
        });
        document.addEventListener("securitypolicyviolation", function(e) {
            logError("CSP violation:", e.violatedDirective, "blocked", e.blockedURI,
                "| policy:", e.originalPolicy);
        });

        // ---- State ----
        var nextId = 1;
        var pending = {};
        var embedded = null;
        // Bumped on every embedNotebook() call so a stale embed that resolves
        // after a newer result can be discarded instead of clobbering it.
        var embedGeneration = 0;

        // ---- Detect whether this host's sandbox CSP permits eval ----
        // WolframNotebookEmbedder injects the cloud notebook engine as <script>s into THIS
        // document; that engine uses eval()/new Function()/WebAssembly, all of which the
        // browser gates on script-src 'unsafe-eval'. Strict MCP hosts (e.g. Goose) build the
        // app sandbox CSP without 'unsafe-eval' and reject any attempt to add it, so the
        // engine throws EvalError and the notebook never renders. When eval is blocked we
        // render the notebook in a cross-origin iframe instead (see embedNotebookViaIframe),
        // where it runs under wolframcloud.com's own eval-permitting CSP. The Function
        // constructor throws synchronously under such a CSP, so this probe is reliable; it
        // emits one expected CSP violation on strict hosts.
        var cspAllowsEval = (function() {
            try { new Function(""); return true; }
            catch (e) { return false; }
        })();
        log("cspAllowsEval =", cspAllowsEval);

        // Default height (px) for the cross-origin iframe fallback, which cannot be
        // auto-sized. The frame starts at this height; the user can drag to resize it.
        var NOTEBOOK_IFRAME_HEIGHT = 200;

        // ---- Load WolframNotebookEmbedder dynamically ----
        var embedderLoaded = new Promise(function(resolve, reject) {
            var script = document.createElement("script");
            script.src = "https://unpkg.com/wolfram-notebook-embedder@0.3/dist/wolfram-notebook-embedder.min.js";
            script.crossOrigin = "";
            log("loading WolframNotebookEmbedder from", script.src);
            script.onload = function() {
                log("WolframNotebookEmbedder script loaded; global available:",
                    typeof WolframNotebookEmbedder !== "undefined");
                resolve();
            };
            script.onerror = function(e) {
                logError("failed to load WolframNotebookEmbedder from CDN:", script.src, e);
                reject(new Error("Failed to load WolframNotebookEmbedder library from CDN."));
            };
            document.head.appendChild(script);
        });

        // ---- DOM refs ----
        var errorEl = document.getElementById("error");
        var loadingEl = document.getElementById("loading");
        var notebookContainer = document.getElementById("notebook-container");
        var resultsEl = document.getElementById("results");

        // ---- Helpers ----
        function showError(msg) {
            errorEl.style.display = "block";
            errorEl.textContent = msg;
        }

        function clearError() {
            errorEl.style.display = "none";
            errorEl.textContent = "";
        }

        function showLoading() {
            loadingEl.style.display = "flex";
        }

        function hideLoading() {
            loadingEl.style.display = "none";
        }

        // ---- Find notebookUrl in structuredContent, _meta, content items, or content marker ----
        // structuredContent is the spec's UI-only channel (kept out of model context); _meta is
        // the fallback for spec-compliant hosts and direct tools/call responses. When a host
        // drops both (ext-apps#696), the tool also embeds the URL in an
        // <internal>...<url>...</url></internal> marker in the text content (see
        // extractNotebookUrlMarker), which the host does not strip.
        function findNotebookUrl(content, meta, structured) {
            if (structured && structured.notebookUrl) return structured.notebookUrl;
            if (meta && meta.notebookUrl) return meta.notebookUrl;
            if (!content || !Array.isArray(content)) return null;
            for (var i = 0; i < content.length; i++) {
                var item = content[i];
                if (item && item._meta && item._meta.notebookUrl) {
                    return item._meta.notebookUrl;
                }
            }
            return extractNotebookUrlMarker(content);
        }

        // ---- Recover the URL from the <internal>...<url>...</url></internal> content marker ----
        // Fallback for hosts that drop _meta/structuredContent (ext-apps#696). The marker's
        // wrapper text tells the model the notebook is already shown and the URL is not for it
        // to use; stripAgentOnlyText removes the whole marker before anything reaches the user.
        function extractNotebookUrlMarker(content) {
            if (!content || !Array.isArray(content)) return null;
            // Prefer the LAST marker in document order. The server appends its marker as the
            // final content item (see appendNotebookURLMarker), so the last marker is the
            // trusted one; scanning for the last match rather than the first keeps a marker
            // injected earlier via user-controlled tool output text from overriding the
            // server-appended URL (even if a host concatenates the text items).
            var re = /<internal>[\s\S]*?<url>([\s\S]*?)<\/url>[\s\S]*?<\/internal>/g;
            var url = null;
            for (var i = 0; i < content.length; i++) {
                var item = content[i];
                if (item && item.type === "text" && typeof item.text === "string") {
                    var m;
                    while ((m = re.exec(item.text)) !== null) {
                        if (m[1].trim()) url = m[1].trim();
                    }
                }
            }
            return url;
        }

        // ---- Detach previous notebook ----
        function detachNotebook() {
            if (embedded) {
                embedded.detach();
                embedded = null;
            }
            notebookContainer.innerHTML = "";
        }

        // ---- Summarize a notebook target for logging ----
        // Inline delivery (MCP_APPS_NOTEBOOK_METHOD="Inline") passes the entire
        // serialized notebook as `url`; logging it verbatim floods the console and
        // can leak notebook content into host-collected logs, so report only size.
        function describeUrl(url) {
            if (typeof url !== "string") return "(non-string: " + (url === null ? "null" : typeof url) + ")";
            return url.startsWith("http") ? url : "(inline notebook, " + url.length + " chars)";
        }

        // ---- Summarize an arbitrary value for logging ----
        // object -> its keys, array -> its item types, anything else -> its type.
        // Never logs values, so large or sensitive payloads (inline notebooks,
        // base64 image data) carried in meta/structuredContent/content can't flood
        // the console or leak into host-collected logs.
        function describe(value) {
            if (Array.isArray(value)) {
                return value.map(function(item) {
                    return item && item.type ? item.type : describe(item);
                });
            }
            if (value && typeof value === "object") return Object.keys(value);
            return value === null ? "null" : typeof value;
        }

        // ---- Wrap an iframe so the user can drag its bottom edge to resize it ----
        // The cross-origin notebook can't be auto-sized, so the fallback frame opens at a
        // default height and the user grows it from there. A native CSS `resize` grip lands
        // in the bottom-right corner, where the framed notebook's own scrollbar sits on top
        // and eats the clicks, so we add our own full-width drag handle along the bottom
        // (in the frame's padding strip, below the iframe) instead.
        function makeResizableFrame(iframe, initialHeight) {
            var frame = document.createElement("div");
            frame.className = "notebook-frame";
            frame.style.height = Math.max(100, initialHeight) + "px";
            frame.appendChild(iframe);

            var handle = document.createElement("div");
            handle.className = "notebook-resize-handle";
            handle.title = "Drag to resize";
            frame.appendChild(handle);

            // Track the initiating pointer so this drag responds only to it. The move/end
            // listeners live on window (below), so without this filter a second finger on a
            // multi-pointer device could resize the frame or end the drag out from under the
            // pointer that started it. The same guard also blocks a concurrent second drag.
            var activePointerId = null;
            handle.addEventListener("pointerdown", function(e) {
                if (activePointerId !== null) return; // a drag is already in progress
                e.preventDefault();
                activePointerId = e.pointerId;
                var startY = e.clientY;
                var startHeight = frame.getBoundingClientRect().height;
                // Disabling the iframe's pointer events keeps the cross-origin frame from
                // swallowing the drag stream; pointer capture is a further optimization that
                // keeps the move/up events flowing while the cursor is over the iframe.
                iframe.style.pointerEvents = "none";
                try { handle.setPointerCapture(e.pointerId); } catch (err) {}

                function onMove(ev) {
                    if (ev.pointerId !== activePointerId) return;
                    frame.style.height = Math.max(100, startHeight + ev.clientY - startY) + "px";
                }
                function onEnd(ev) {
                    if (ev.pointerId !== activePointerId) return;
                    activePointerId = null;
                    iframe.style.pointerEvents = "";
                    window.removeEventListener("pointermove", onMove);
                    window.removeEventListener("pointerup", onEnd);
                    window.removeEventListener("pointercancel", onEnd);
                }
                // Bind move/end on window, not the handle, so a drag that strays off the
                // handle (e.g. when setPointerCapture is unsupported) still delivers its
                // events and cleans up, instead of leaving the frame stuck non-interactive.
                window.addEventListener("pointermove", onMove);
                window.addEventListener("pointerup", onEnd);
                window.addEventListener("pointercancel", onEnd);
            });

            return frame;
        }

        // ---- Restrict the eval-blocked iframe fallback to Wolfram Cloud URLs ----
        // The fallback frames the URL directly (see embedNotebookViaIframe), so only allow
        // https Wolfram Cloud hosts. A tampered or attacker-controlled result then can't
        // cause an arbitrary third-party page to load in the iframe. The embedder path is
        // left unchanged; it still accepts inline notebooks and other targets.
        function isWolframCloudUrl(url) {
            try {
                var u = new URL(url);
                return u.protocol === "https:" &&
                    (u.hostname === "wolframcloud.com" || u.hostname.endsWith(".wolframcloud.com"));
            } catch (err) {
                return false;
            }
        }

        // ---- Embed a cloud notebook via a cross-origin iframe ----
        // Used when the host CSP blocks eval (see cspAllowsEval). Pointing an iframe
        // straight at the cloud URL renders the notebook under wolframcloud.com's own
        // (eval-permitting) CSP, isolated from this app's CSP. The cloud notebook is
        // deployed chrome-free (AppearanceElements -> None), but a cross-origin iframe
        // can't be measured, so it opens at a fixed default height the user can drag to
        // resize, with internal scrolling, rather than the embedder's fit-to-content
        // sizing. http(s) URLs only; inline notebook exprs have no framable URL and
        // never reach here.
        function embedNotebookViaIframe(url, generation) {
            var iframe = document.createElement("iframe");
            iframe.src = url;
            iframe.title = "Wolfram notebook";

            var settled = false;
            var watchdog = setTimeout(function() {
                // Skip the warning if the iframe is no longer in the document: a newer
                // embed or teardown removed it on purpose, so it wasn't stuck loading.
                if (!settled && iframe.isConnected) {
                    logError("embedNotebookViaIframe: iframe still loading after 20s for", url,
                        "- possible blocked wolframcloud.com iframe or network stall");
                }
            }, 20000);

            iframe.addEventListener("load", function() {
                settled = true;
                clearTimeout(watchdog);
                if (generation !== embedGeneration) return;
                log("embedNotebookViaIframe: iframe loaded for", url);
                // Notebook is on screen now; drop the redundant text/image fallback.
                resultsEl.innerHTML = "";
                loadingEl.style.display = "none";
            });
            notebookContainer.appendChild(makeResizableFrame(iframe, NOTEBOOK_IFRAME_HEIGHT));
        }

        // ---- Embed a cloud notebook ----
        function embedNotebook(url) {
            detachNotebook();
            // Do NOT clear resultsEl here: any text/image fallback rendered by
            // handleToolResult must stay visible until the embed actually
            // succeeds, so an embed failure (CSP, CDN, blocked iframe, network
            // stall) still leaves readable output on screen.
            loadingEl.style.display = "flex";

            var generation = ++embedGeneration;
            var isHttpUrl = typeof url === "string" && url.startsWith("http");
            var target = isHttpUrl ? url : { expr: url };
            log("embedNotebook: target =", describeUrl(url));

            // Strict host CSP (no 'unsafe-eval'): the in-document embedder can't run the
            // notebook engine. Render the cloud notebook in a cross-origin iframe instead
            // — but only for Wolfram Cloud URLs, so a tampered result can't frame an
            // arbitrary third-party page.
            if (!cspAllowsEval && isWolframCloudUrl(url)) {
                log("embedNotebook: host CSP blocks eval; rendering via cross-origin iframe");
                embedNotebookViaIframe(url, generation);
                return;
            }

            // Watchdog: if embed() neither resolves nor rejects, nothing hits the
            // console. Warn so a blocked iframe / network stall is visible.
            var settled = false;
            var watchdog = setTimeout(function() {
                if (!settled) {
                    logError("embedNotebook: embed() still pending after 20s for", describeUrl(url),
                        "- possible blocked wolframcloud.com iframe or network stall");
                }
            }, 20000);

            embedderLoaded.then(function() {
                if (typeof WolframNotebookEmbedder === "undefined" || !WolframNotebookEmbedder.embed) {
                    throw new Error("WolframNotebookEmbedder.embed is unavailable after load");
                }
                log("embedNotebook: calling WolframNotebookEmbedder.embed()");
                return WolframNotebookEmbedder.embed(target, notebookContainer, {
                    allowInteract: true,
                    showRenderProgress: true,
                    width: null,
                    maxHeight: Infinity
                });
            }).then(function(nb) {
                settled = true;
                clearTimeout(watchdog);
                if (generation !== embedGeneration) {
                    // A newer result superseded this embed; discard it so it
                    // can't clear the current fallback or steal `embedded`.
                    if (nb && nb.detach) nb.detach();
                    return;
                }
                log("embedNotebook: embed succeeded");
                embedded = nb;
                // Notebook is on screen now; drop the redundant text/image fallback.
                resultsEl.innerHTML = "";
                loadingEl.style.display = "none";
            }).catch(function(err) {
                settled = true;
                clearTimeout(watchdog);
                if (generation !== embedGeneration) return;
                // Embed failed; leave the text/image fallback rendered by
                // handleToolResult in place so the user still sees output.
                logError("embedNotebook: embed failed for", describeUrl(url), "->", err);
                loadingEl.style.display = "none";
            });
        }

        // ---- Strip text intended only for the AI, not the user ----
        // Some tool outputs carry hints meant purely for the model, which should
        // never be surfaced in the widget:
        //   * the Wolfram session-ID <system-reminder> appended to evaluator output
        //   * the interactive-widget notice injected by the host (e.g. Claude Desktop)
        //   * the <internal>...</internal> notebook-URL marker (see extractNotebookUrlMarker)
        function stripAgentOnlyText(text) {
            if (!text) return "";
            return text
                .replace(/<system-reminder>[\s\S]*?<\/system-reminder>/g, "")
                .replace(/\[This tool call rendered an interactive widget[\s\S]*?\]/g, "")
                .replace(/<internal>[\s\S]*?<\/internal>/g, "")
                .trim();
        }

        // ---- Render tool result content (text+image fallback) ----
        function renderContent(content) {
            resultsEl.innerHTML = "";

            if (!content || !Array.isArray(content) || content.length === 0) return;

            for (var i = 0; i < content.length; i++) {
                var item = content[i];
                if (!item || !item.type) continue;

                // Skip metadata-only items (notebookUrl carrier)
                if (item._meta && (!item.text || item.text === "")) continue;

                if (item.type === "text" && item.text) {
                    var text = stripAgentOnlyText(item.text);
                    if (!text) continue;
                    var div = document.createElement("div");
                    div.className = "result-text";
                    div.textContent = text;
                    resultsEl.appendChild(div);
                } else if (item.type === "image" && item.data && item.mimeType) {
                    var imgDiv = document.createElement("div");
                    imgDiv.className = "result-image";
                    var img = document.createElement("img");
                    img.src = "data:" + item.mimeType + ";base64," + item.data;
                    img.alt = "Evaluation result";
                    imgDiv.appendChild(img);
                    resultsEl.appendChild(imgDiv);
                }
            }
        }

        function renderPlainText(text) {
            resultsEl.innerHTML = "";
            var clean = stripAgentOnlyText(text);
            if (!clean) return;
            var div = document.createElement("div");
            div.className = "result-text";
            div.textContent = clean;
            resultsEl.appendChild(div);
        }

        // ---- Handle tool result: try notebook embed, or fall back to text+image ----
        function handleToolResult(content, meta, structured) {
            var notebookUrl = findNotebookUrl(content, meta, structured);
            log("handleToolResult: notebookUrl =", describeUrl(notebookUrl),
                "| meta =", describe(meta),
                "| structuredContent =", describe(structured),
                "| content =", describe(content));

            if (notebookUrl) {
                // Render the text/image fallback first so a failed embed still
                // leaves readable output; embedNotebook() clears it again once
                // the notebook actually renders.
                renderContent(content);
                embedNotebook(notebookUrl);
            } else {
                log("handleToolResult: no notebookUrl; rendering text/image fallback");
                detachNotebook();
                renderContent(content);
            }
        }

        // ---- postMessage transport ----
        function send(msg) {
            window.parent.postMessage(msg, "*");
        }

        function sendRequest(method, params) {
            var id = nextId++;
            var msg = { jsonrpc: "2.0", id: id, method: method, params: params || {} };
            send(msg);
            return new Promise(function(resolve, reject) {
                pending[id] = { resolve: resolve, reject: reject };
            });
        }

        function sendNotification(method, params) {
            var msg = { jsonrpc: "2.0", method: method };
            if (params) msg.params = params;
            send(msg);
        }

        function sendResult(id, result) {
            send({ jsonrpc: "2.0", id: id, result: result });
        }

        function sendError(id, code, message) {
            send({ jsonrpc: "2.0", id: id, error: { code: code, message: message } });
        }

        // ---- Auto-resize ----
        function setupAutoResize() {
            if (typeof ResizeObserver === "undefined") return;
            var appRoot = document.getElementById("app-root");
            var observer = new ResizeObserver(function() {
                var width = appRoot.scrollWidth;
                var height = appRoot.scrollHeight;
                sendNotification("ui/notifications/size-changed", {
                    width: width,
                    height: height
                });
            });
            observer.observe(appRoot);
        }

        // ---- Theme application ----
        function applyTheme(ctx) {
            if (!ctx) return;
            if (ctx.styles && ctx.styles.css) {
                var vars = ctx.styles.css.variables;
                if (vars) {
                    var keys = Object.keys(vars);
                    for (var i = 0; i < keys.length; i++) {
                        document.documentElement.style.setProperty(keys[i], vars[keys[i]]);
                    }
                }
                if (ctx.styles.css.fonts && ctx.styles.css.fonts.length) {
                    for (var j = 0; j < ctx.styles.css.fonts.length; j++) {
                        var style = document.createElement("style");
                        style.textContent = ctx.styles.css.fonts[j];
                        document.head.appendChild(style);
                    }
                }
            }
            if (ctx.styles && ctx.styles.variables) {
                var topVars = ctx.styles.variables;
                var topKeys = Object.keys(topVars);
                for (var k = 0; k < topKeys.length; k++) {
                    document.documentElement.style.setProperty(topKeys[k], topVars[topKeys[k]]);
                }
            }
        }

        // ---- Incoming message handler ----
        window.addEventListener("message", function(event) {
            if (event.source !== window.parent) return;

            var msg = event.data;
            if (!msg || typeof msg !== "object" || msg.jsonrpc !== "2.0") return;

            // Handle responses to our requests
            if (msg.id != null && pending[msg.id]) {
                var p = pending[msg.id];
                delete pending[msg.id];
                if (msg.error) {
                    p.reject(msg.error);
                } else {
                    p.resolve(msg.result);
                }
                return;
            }

            // Handle notifications and requests from host
            var method = msg.method;
            if (!method) return;

            switch (method) {
                case "ui/notifications/tool-input":
                    clearError();
                    detachNotebook();
                    resultsEl.innerHTML = "";
                    showLoading();
                    break;

                case "ui/notifications/tool-input-partial":
                    break;

                case "ui/notifications/tool-result":
                    hideLoading();
                    var params = msg.params || {};
                    log("ui/notifications/tool-result: param keys =", Object.keys(params),
                        "| content items =", Array.isArray(params.content) ? params.content.length : 0);
                    if (params.content && Array.isArray(params.content)) {
                        handleToolResult(params.content, params._meta, params.structuredContent);
                    } else if (params.text) {
                        renderPlainText(params.text);
                    }
                    break;

                case "ui/notifications/tool-cancelled":
                    hideLoading();
                    detachNotebook();
                    break;

                case "ui/notifications/host-context-changed":
                    applyTheme(msg.params);
                    break;

                case "ui/resource-teardown":
                    detachNotebook();
                    resultsEl.innerHTML = "";
                    hideLoading();
                    if (msg.id != null) sendResult(msg.id, {});
                    break;

                default:
                    if (msg.id != null) {
                        sendError(msg.id, -32601, "Method not found: " + method);
                    }
                    break;
            }
        });

        // ---- Initialize ----
        sendRequest("ui/initialize", {
            protocolVersion: "2026-01-26",
            appInfo: {
                name: "evaluator-viewer",
                version: "1.0.0"
            },
            appCapabilities: {
                availableDisplayModes: ["inline"],
                tools: { listChanged: false }
            }
        }).then(function(result) {
            log("ui/initialize succeeded; host result:", result);
            sendNotification("ui/notifications/initialized");
            setupAutoResize();
            if (result) {
                applyTheme(result.hostContext || result.context || result);
            }
        }).catch(function(err) {
            logError("ui/initialize failed:", err);
            showError("Failed to initialize: " + ((err && err.message) || String(err)));
        });
    })();
    </script>
</body>
</html>
